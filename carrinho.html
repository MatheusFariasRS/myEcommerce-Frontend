<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myEcommerce</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <header>
        <nav class="myE-container">
          <h1>myEcommerce</h1>
          <a href="#">Entrar</a>
        </nav>
      </header>
      <main>
        <section id="cart-container-section" class="myE-container">
          <div class="myE-card">
            <div class="myE-cart-item-container myE-line-bottom">
              <div class="myE-cart-item-left">
                <img src="images/computer.png" alt="Computador" />
                <div class="myE-cart-item-description">
                  <h3>Computador Gamer XT</h3>
                  <div class="myE-cart-item-quantity-container">
                    <div class="myE-cart-item-quantity-btn">-</div>
                    <p>1</p>
                    <div class="myE-cart-item-quantity-btn">+</div>
                  </div>
                </div>
              </div>
              <div class="myE-cart-item-right">
                R$ 5000,00
              </div>
            </div>
            <div class="myE-cart-item-container myE-line-bottom">
              <div class="myE-cart-item-left">
                <img src="images/computer.png" alt="Computador" />
                <div class="myE-cart-item-description">
                  <h3>Computador Gamer XT</h3>
                  <div class="myE-cart-item-quantity-container">
                    <div class="myE-cart-item-quantity-btn">-</div>
                    <p>2</p>
                    <div class="myE-cart-item-quantity-btn">+</div>
                  </div>
                </div>
              </div>
              <div class="myE-cart-item-right">
                R$ 10000,00
              </div>
            </div>
            <div class="myE-cart-total-container">
              <h3>R$ 15000,00</h3>
            </div>
          </div>
          <div class="myE-btn-container">
              <div class="myE-btn myE-btn-blue myE-mb20">
                Finalizar pedido
              </div>
              <div class="myE-btn myE-btn-white">
                Continuar comprando
              </div>
          </div>
        </section>
    </main>
</body>

</html>
