<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myEcommerce</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <header class="myE-header-client">
        <nav class="myE-container">
          <h1>myEcommerce</h1>
          <div class="myE-navbar-right">
            <div class="myE-menu-items-container">
              <div class="myE-menu-item">
                <img src="/images/admin.svg" alt="admin">
              </div>
              <div class="myE-menu-item">
                <img src="images/cart.svg" alt="Carrinho de compras">
              </div>
            </div>
            <div class="myE-logged-user">
              <p>Maria Silva</p>
              <a href="#">Sair</a>
            </div>
          </div>
        </nav>
      </header>
      <main>
        <section id="confirmation-section" class="myE-container">
          <div class="myE-card myE-mb20">
            <div class="myE-cart-item-container myE-line-bottom">
              <div class="myE-cart-item-left">
                <img src="images/computer.png" alt="Computador" />
                <div class="myE-cart-item-description">
                  <h3>Computador Gamer XT</h3>
                  <div class="myE-cart-item-quantity-container">
                    <p>1</p>
                  </div>
                </div>
              </div>
              <div class="myE-cart-item-right">
                R$ 5000,00
              </div>
            </div>
            <div class="myE-cart-item-container myE-line-bottom">
              <div class="myE-cart-item-left">
                <img src="images/computer.png" alt="Computador" />
                <div class="myE-cart-item-description">
                  <h3>Computador Gamer XT</h3>
                  <div class="myE-cart-item-quantity-container">
                    <p>2</p>
                  </div>
                </div>
              </div>
              <div class="myE-cart-item-right">
                R$ 10000,00
              </div>
            </div>
            <div class="myE-cart-total-container">
              <h3>R$ 15000,00</h3>
            </div>
          </div>
          <div class="myE-confirmation-message myE-mb20">
            Pedido realizado! Número 35
          </div>
          <div class="myE-btn-container">
              <div class="myE-btn myE-btn-white">
                Início
              </div>
          </div>
        </section>
    </main>
</body>

</html>
