<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myEcommerce</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <header class="myE-header-client">
      <nav class="myE-container">
        <h1>myEcommerce</h1>
        <div class="myE-navbar-right">
          <div class="myE-menu-items-container">
            <div class="myE-menu-item">
              <img src="images/cart.svg" alt="Carrinho de compras">
            </div>
          </div>
          <div>
            <a href="#">Entrar</a>
          </div>
        </div>
      </nav>
      </header>
      <main>
        <section id="login-section" class="myE-container">
          <div class="myE-login-form-container">
            <form class="myE-card myE-form">
              <h2>Login</h2>
              <div class="myE-form-controls-container">
                <div>
                  <input class="myE-form-control myE-input-error" type="text" placeholder="Email">
                  <div class="myE-form-error">Campo obrigatório</div>
                </div>
                <div>
                  <input class="myE-form-control" type="password" placeholder="Senha">
                </div>
              </div>
              <div class="myE-login-form-buttons myE-mt20">
                <button type="submit" class="myE-btn myE-btn-blue">Entrar</button>
              </div>
            </form>
          </div>
        </section>
    </main>
</body>

</html>
